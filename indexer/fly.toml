# Fly.io configuration for charms-indexer (background worker)
app = "charms-explorer-indexer"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  ENABLE_BITCOIN_MAINNET = "true"
  ENABLE_BITCOIN_TESTNET4 = "true"

# Restart policy: always restart, unlimited retries.
# The indexer is a long-running worker — it must never stay stopped.
[[restart]]
  policy = "always"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
